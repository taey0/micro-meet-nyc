<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F07030"/>
      <stop offset="100%" stop-color="#D46008"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="224" fill="url(#g)"/>
  <!-- "45" — sized and positioned by hand to optical center -->
  <!-- viewBox 0 0 1024 1024, text baseline at y=660, x=512 center -->
  <text
    x="512"
    y="660"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial Black', Helvetica, Arial, sans-serif"
    font-weight="900"
    font-size="500"
    letter-spacing="-30"
    fill="#FFFFFF"
  >45</text>
</svg>
